  <script>
// ===== Audio System =====
let soundEnabled=true;
const audioContext=new(window.AudioContext||window.webkitAudioContext)();

function playTone(freq,duration,type='sine',volume=0.3){
  if(!soundEnabled)return;
  try{
    const osc=audioContext.createOscillator();
    const gain=audioContext.createGain();
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.type=type;
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(volume,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+duration);
    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime+duration);
  }catch(e){}
}

function playCorrectSound(){
  // Clear uplifting sound for correct answer
  playTone(523.25,0.1,'sine',0.2);
  playTone(659.25,0.15,'sine',0.25);
  playTone(783.99,0.2,'sine',0.3);
}

function playWrongSound(){
  // Low descending tone for wrong answer
  playTone(220,0.15,'sine',0.3);
  playTone(164.81,0.2,'sine',0.3);
}

function playBossHitSound(){
  // Quick aggressive tone for boss hit
  playTone(440,0.05,'sawtooth',0.3);
  playTone(660,0.1,'sawtooth',0.2);
}

function playGameOverSound(){
  // Deep descending tones
  playTone(392,0.15,'sine',0.3);
  playTone(329.63,0.15,'sine',0.3);
  playTone(246.94,0.3,'sine',0.3);
}

function playVictorySound(){
  // Ascending triumphant tones
  playTone(523.25,0.15,'sine',0.3);
  playTone(659.25,0.15,'sine',0.3);
  playTone(783.99,0.3,'sine',0.3);
}

function playStartSound(){
  // Adventure start fanfare
  playTone(440,0.1,'sine',0.2);
  playTone(554.37,0.1,'sine',0.2);
  playTone(659.25,0.2,'sine',0.3);
}

function toggleMute(){
  soundEnabled=!soundEnabled;
  const btn=document.getElementById('mute-toggle');
  btn.textContent=soundEnabled?'🔊':'🔇';
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(err=>{});
  } else {
    document.exitFullscreen().catch(err=>{});
  }
}

function startGame(){
  playStartSound();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-container').classList.remove('hidden');
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(err=>{});
  }
  initGame();
  animateBossEntrance();
  renderQuestion();
}

function animateBossEntrance(){
  document.getElementById('monster-0').classList.add('entrance');
  document.getElementById('monster-1').classList.add('entrance');
}

// ===== Game Logic =====
const questions=[

  {sentence:'教室裏十分安靜___大家都在專心考試。',answer:['，']},
  {sentence:'太好了___我們終於完成比賽了___',answer:['！','！']},
  {sentence:'公園裏有鞦韆___滑梯和沙池。',answer:['、']},

  {sentence:'爸爸提醒我___要準時睡覺。',answer:['：']},

  {sentence:'小時候，祖父是最疼愛我的保母___我長大後，祖父是我最好的人生導師。',answer:['；']},
  {sentence:'小時候，我在樹下玩捉迷藏___長大了，我在樹下編織夢想。',answer:['；']},
  {sentence:'夏天來了，大家汗流浹背___冬天來了，大家冷得發抖。',answer:['；']},
  {sentence:'有些同學喜歡閱讀小說___有些同學喜歡閱讀科學書。',answer:['；']},
];

const maxBossHP=500, maxPlayerHP=100;
let currentQ=0;
const scores=[0,0], combos=[0,0], playerHP=[100,100], bossHP=[500,500];
const currentInput=[0,0];
const playerState=['playing','playing']; // 'playing','won','dead'

function renderQuestion(){
  const q=questions[currentQ%questions.length];
  let sentence=q.sentence;
  sentence=sentence.replace(/___/g,'<span class="inline-block w-4 border-b-3 border-dashed border-yellow-400 mx-0.5"></span>');
  document.getElementById('question-text-p0').innerHTML=sentence;
  document.getElementById('question-text-p1').innerHTML=sentence;
}

function updateBossHP(p){
  const pct=Math.max(0,bossHP[p])/maxBossHP*100;
  document.getElementById(`boss-hp-${p}`).style.width=pct+'%';
  document.getElementById(`boss-hp-text-${p}`).textContent=`HP ${Math.max(0,bossHP[p])}/${maxBossHP}`;
}

function updatePlayerHP(p){
  const pct=Math.max(0,playerHP[p]);
  const el=document.getElementById(`p${p+1}-hp`);
  el.style.width=pct+'%';
  el.className='player-hp-inner '+(pct<=30?'bg-red-400':pct<=60?'bg-yellow-400':'bg-green-400');
}

function showDamage(p,dmg){
  const el=document.createElement('div');
  el.className='dmg-num';
  el.textContent=`-${dmg}`;
  el.style.left=(30+Math.random()*40)+'%';
  el.style.top=(20+Math.random()*30)+'%';
  document.getElementById(`dmg-${p}`).appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function checkEnd(){
  const done=playerState.every(s=>s!=='playing');
  if(!done)return;
  // Show result
  const overlay=document.getElementById('result-overlay');
  const icon=document.getElementById('result-icon');
  const title=document.getElementById('result-title');
  const detail=document.getElementById('result-detail');

  if(playerState[0]==='won'&&playerState[1]==='dead'){
    icon.textContent='🏆';title.textContent='玩家1 勝利！';title.style.color='#fbbf24';
    detail.textContent=`騎士 ${scores[0]}分`;
  } else if(playerState[1]==='won'&&playerState[0]==='dead'){
    icon.textContent='🏆';title.textContent='玩家2 勝利！';title.style.color='#fbbf24';
    detail.textContent=`法師 ${scores[1]}分`;
  } else if(playerState[0]==='won'&&playerState[1]==='won'){
    if(scores[0]>scores[1]){
      icon.textContent='🏆';title.textContent='玩家1 勝利！';title.style.color='#fbbf24';
    } else if(scores[1]>scores[0]){
      icon.textContent='🏆';title.textContent='玩家2 勝利！';title.style.color='#fbbf24';
    } else {
      icon.textContent='🤝';title.textContent='平手！';title.style.color='#60a5fa';
    }
    detail.textContent=`騎士 ${scores[0]}分 vs 法師 ${scores[1]}分`;
  } else {
    icon.textContent='💀';title.textContent='MISSION FAILED';title.style.color='#dc2626';
    detail.textContent='兩位玩家都陣亡了...';
  }
  overlay.classList.remove('hidden');
}

function showSideOverlay(p,type){
  const side=document.getElementById(`side-${p}`);
  if(side.querySelector('.game-over-overlay'))return;
  const ov=document.createElement('div');
  ov.className='game-over-overlay';
  if(type==='dead'){
    ov.innerHTML='<div class="game-over-text">GAME OVER</div>';
    side.classList.add('defeated');
  } else {
    ov.innerHTML='<div class="victory-text-side">勝利！🎉</div>';
  }
  side.appendChild(ov);
}

function answer(p,punct){
  if(playerState[p]!=='playing')return;

  const q=questions[currentQ%questions.length];
  const expected=q.answer[currentInput[p]];

  if(punct===expected){
    playCorrectSound();
    if(currentInput[p]===q.answer.length-1){
      currentInput[p]=0;
      combos[p]++;
      let dmg=20;
      if(combos[p]>=5)dmg=40;
      else if(combos[p]>=3)dmg=30;
      bossHP[p]-=dmg;
      scores[p]+=combos[p]>=3?20:10;

      playBossHitSound();

      const mon=document.getElementById(`monster-${p}`);
      mon.classList.add('shake');
      setTimeout(()=>mon.classList.remove('shake'),300);
      showDamage(p,dmg);

      if(bossHP[p]<=0){
        bossHP[p]=0;
        playerState[p]='won';
        playVictorySound();
        showSideOverlay(p,'won');
        document.querySelectorAll(`[data-player="${p}"] button`).forEach(b=>b.disabled=true);
      }
      updateBossHP(p);
      document.getElementById(`p${p+1}-score`).textContent=scores[p]+'分';

      // Advance question only if both still need it or one finished
      const bothDone=currentInput[0]===0&&currentInput[1]===0;
      if(bothDone||(playerState[0]!=='playing'||playerState[1]!=='playing')){
        currentQ++;
        renderQuestion();
      }
      checkEnd();
    } else {
      currentInput[p]++;
    }
  } else {
    playWrongSound();
    currentInput[p]=0;
    combos[p]=0;
    playerHP[p]-=15;
    updatePlayerHP(p);
    const side=document.getElementById(`side-${p}`);
    side.classList.add('shake');
    setTimeout(()=>side.classList.remove('shake'),300);
    if(playerHP[p]<=0){
      playerHP[p]=0;
      playerState[p]='dead';
      playGameOverSound();
      showSideOverlay(p,'dead');
      document.querySelectorAll(`[data-player="${p}"] button`).forEach(b=>b.disabled=true);
      checkEnd();
    }
  }
}

function restartGame(){
  currentQ=0;
  scores.fill(0);combos.fill(0);
  playerHP.fill(maxPlayerHP);bossHP.fill(maxBossHP);
  currentInput.fill(0);
  playerState[0]='playing';playerState[1]='playing';

  document.getElementById('result-overlay').classList.add('hidden');

  for(let i=0;i<2;i++){
    const side=document.getElementById(`side-${i}`);
    side.classList.remove('defeated');
    const ov=side.querySelector('.game-over-overlay');
    if(ov)ov.remove();
    document.querySelectorAll(`[data-player="${i}"] button`).forEach(b=>b.disabled=false);
    updatePlayerHP(i);
    updateBossHP(i);
    document.getElementById(`p${i+1}-score`).textContent='0分';
  }
  animateBossEntrance();
  renderQuestion();
}

function initGame(){
  renderQuestion();
  updateBossHP(0);
  updateBossHP(1);
}
