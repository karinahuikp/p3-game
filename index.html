    .hidden{display:none!important}
.battle-bg{
  background-color:#07030f;
  background-image:
    radial-gradient(circle at 50% 35%, rgba(130,40,120,0.28), transparent 32%),
    radial-gradient(circle at 18% 30%, rgba(255,90,40,0.18), transparent 16%),
    radial-gradient(circle at 82% 30%, rgba(255,90,40,0.18), transparent 16%),
    linear-gradient(180deg, rgba(20,5,35,0.95) 0%, rgba(8,2,18,0.98) 58%, rgba(3,1,10,1) 100%),

    repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 60px);
  position:relative;
}

.battle-bg::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at 50% 78%, rgba(160,50,160,0.22), transparent 38%),
    linear-gradient(180deg, transparent 0%, transparent 62%, rgba(80,35,95,0.22) 63%, rgba(12,4,25,0.8) 100%);
  pointer-events:none;
}

.battle-bg::after{
  content:"";
  position:absolute;
  left:10%;
  right:10%;
  bottom:18%;
  height:18%;
  border-radius:50%;
  background:radial-gradient(ellipse, rgba(180,55,170,0.28), transparent 68%);
  filter:blur(2px);
  pointer-events:none;
}

<script>
let soundEnabled=true;
let audioContext=null;

function ensureAudioContext(){
  if(!audioContext){
    audioContext=new(window.AudioContext||window.webkitAudioContext)();
  }
}

function playTone(freq,duration,type='sine',volume=0.3){
  if(!soundEnabled)return;
  try{
    ensureAudioContext();
    const osc=audioContext.createOscillator();
    const gain=audioContext.createGain();
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.type=type;
    osc.frequency.value=freq;
    gain.gain.setValueAtTime(volume,audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,audioContext.currentTime+duration);
    osc.start(audioContext.currentTime);
    osc.stop(audioContext.currentTime+duration);
  }catch(e){}
}

function playCorrectSound(){playTone(523.25,0.1);playTone(659.25,0.15);playTone(783.99,0.2)}
function playWrongSound(){playTone(220,0.15);playTone(164.81,0.2)}
function playBossHitSound(){playTone(440,0.05,'sawtooth');playTone(660,0.1,'sawtooth')}
function playGameOverSound(){playTone(392,0.15);playTone(329.63,0.15);playTone(246.94,0.3)}
function playVictorySound(){playTone(523.25,0.15);playTone(659.25,0.15);playTone(783.99,0.3)}
function playStartSound(){playTone(440,0.1);playTone(554.37,0.1);playTone(659.25,0.2)}

function toggleMute(){
  soundEnabled=!soundEnabled;
  document.getElementById('mute-toggle').textContent=soundEnabled?'🔊':'🔇';
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }else{
    document.exitFullscreen().catch(()=>{});
  }
}

function startGame(){
  ensureAudioContext();
  playStartSound();
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-container').classList.remove('hidden');
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
  initGame();
  animateBossEntrance();
}

function animateBossEntrance(){
  document.getElementById('monster-0').classList.add('entrance');
  document.getElementById('monster-1').classList.add('entrance');
  setTimeout(()=>{
    document.getElementById('monster-0').classList.remove('entrance');
    document.getElementById('monster-1').classList.remove('entrance');
  },900);
}

const maxBossHP=500,maxPlayerHP=100;
const scores=[0,0],combos=[0,0],playerHP=[100,100],bossHP=[500,500];
const correctCount=[0,0], wrongCount=[0,0], defeatedBossCount=[0,0];
const currentInput=[0,0];
const playerState=['playing','playing'];
let currentQuestion=[null,null];

function getRandomQuestion(excludeQuestion=null){
  let q;
  do{
    q=questions[Math.floor(Math.random()*questions.length)];
  }while(excludeQuestion && q.sentence===excludeQuestion.sentence && questions.length>1);
  return q;
}

function assignNewQuestion(player){
  const otherPlayer=player===0?1:0;
  currentQuestion[player]=getRandomQuestion(currentQuestion[otherPlayer]);
  currentInput[player]=0;
  renderQuestion(player);
}

function renderQuestion(player){
  const q=currentQuestion[player];
  if(!q)return;
  let sentence=q.sentence;
  sentence=sentence.replace(/___/g,'<span class="inline-block w-4 border-b-4 border-dashed border-yellow-400 mx-1"></span>');
  document.getElementById(`question-text-p${player}`).innerHTML=sentence;
}

function initQuestions(){
  currentQuestion[0]=getRandomQuestion();
  currentQuestion[1]=getRandomQuestion(currentQuestion[0]);
  currentInput[0]=0;
  currentInput[1]=0;
  renderQuestion(0);
  renderQuestion(1);
}

function updateBossHP(p){
  const pct=Math.max(0,bossHP[p])/maxBossHP*100;

  document.getElementById(`boss-hp-${p}`).style.width=pct+'%';

  document.getElementById(`boss-hp-text-${p}`).textContent=
    `HP ${Math.max(0,bossHP[p])}/${maxBossHP}`;

  const monster=document.getElementById(`monster-${p}`);

  if(pct<=30 && pct>0){
    monster.classList.add('enraged');
  }else{
    monster.classList.remove('enraged');
  }
}

function updatePlayerHP(p){
  const pct=Math.max(0,playerHP[p]);
  const el=document.getElementById(`p${p+1}-hp`);
  el.style.width=pct+'%';
  el.className='player-hp-inner '+(pct<=30?'bg-red-400':pct<=60?'bg-yellow-400':'bg-green-400');
}

function showDamage(p,dmg){
  const el=document.createElement('div');
  el.className='dmg-num';
  el.textContent=`-${dmg}`;
  el.style.left=(30+Math.random()*40)+'%';
  el.style.top=(20+Math.random()*30)+'%';
  document.getElementById(`dmg-${p}`).appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function checkEnd(){
  const done=playerState.every(s=>s!=='playing');
  if(!done)return;

  const overlay=document.getElementById('result-overlay');
  const icon=document.getElementById('result-icon');
  const title=document.getElementById('result-title');
  const detail=document.getElementById('result-detail');

  if(playerState[0]==='won'&&playerState[1]==='dead'){
    icon.textContent='🏆';title.textContent='玩家1 勝利！';title.style.color='#fbbf24';detail.textContent=`騎士 ${scores[0]}分`;
  }else if(playerState[1]==='won'&&playerState[0]==='dead'){
    icon.textContent='🏆';title.textContent='玩家2 勝利！';title.style.color='#fbbf24';detail.textContent=`法師 ${scores[1]}分`;
  }else if(playerState[0]==='won'&&playerState[1]==='won'){
    if(scores[0]>scores[1]){
      icon.textContent='🏆';title.textContent='玩家1 勝利！';title.style.color='#fbbf24';
    }else if(scores[1]>scores[0]){
      icon.textContent='🏆';title.textContent='玩家2 勝利！';title.style.color='#fbbf24';
    }else{
      icon.textContent='🤝';title.textContent='平手！';title.style.color='#60a5fa';
    }
    detail.textContent=`騎士 ${scores[0]}分 vs 法師 ${scores[1]}分`;
  }else{
    icon.textContent='💀';title.textContent='MISSION FAILED';title.style.color='#dc2626';detail.textContent='兩位玩家都陣亡了...';
  }
  detail.innerHTML = `
  <div style="font-size:1.4rem; line-height:1.8;">
    <p>🛡️ 騎士：${scores[0]}分｜擊敗 ${defeatedBossCount[0]} 隻Boss｜答對 ${correctCount[0]} 題｜答錯 ${wrongCount[0]} 題</p>
    <p>🧙 法師：${scores[1]}分｜擊敗 ${defeatedBossCount[1]} 隻Boss｜答對 ${correctCount[1]} 題｜答錯 ${wrongCount[1]} 題</p>
  </div>
`;
  overlay.classList.remove('hidden');
}

function showSideOverlay(p,type){
  const side=document.getElementById(`side-${p}`);
  if(side.querySelector('.game-over-overlay'))return;
  const ov=document.createElement('div');
  ov.className='game-over-overlay';
  if(type==='dead'){
    ov.innerHTML='<div class="game-over-text">GAME OVER</div>';
    side.classList.add('defeated');
  }else{
    ov.innerHTML='<div class="victory-text-side">勝利！🎉</div>';
  }
  side.appendChild(ov);
}

function answer(p,punct){
  if(playerState[p]!=='playing')return;

  const q=currentQuestion[p];
  if(!q)return;

  const expected=q.answer[currentInput[p]];

  if(punct===expected){
    playCorrectSound();

    if(currentInput[p]===q.answer.length-1){
      currentInput[p]=0;
      combos[p]++;

      let dmg=20;
      if(combos[p]>=5)dmg=40;
      else if(combos[p]>=3)dmg=30;

      bossHP[p]-=dmg;
      scores[p]+=combos[p]>=3?20:10;
      correctCount[p]++;
      playBossHitSound();

      const mon=document.getElementById(`monster-${p}`);
      mon.classList.add('shake');
      setTimeout(()=>mon.classList.remove('shake'),300);

      showDamage(p,dmg);
      
if(bossHP[p]<=0){
  defeatedBossCount[p]++;
  bossHP[p]=maxBossHP;
  playVictorySound();
  assignNewQuestion(p);
}else{
  assignNewQuestion(p);
}

      updateBossHP(p);
      document.getElementById(`p${p+1}-score`).textContent=scores[p]+'分';
      checkEnd();

    }else{
      currentInput[p]++;
    }

  }else{
    playWrongSound();
    currentInput[p]=0;
    combos[p]=0;
    wrongCount[p]++;
    playerHP[p]-=15;
    updatePlayerHP(p);

    const side=document.getElementById(`side-${p}`);
    side.classList.add('shake');
    setTimeout(()=>side.classList.remove('shake'),300);

    if(playerHP[p]<=0){
      playerHP[p]=0;
      playerState[p]='dead';
      playGameOverSound();
      showSideOverlay(p,'dead');
      document.querySelectorAll(`[data-player="${p}"] button`).forEach(b=>b.disabled=true);
      checkEnd();
    }
  }
}

function restartGame(){
  scores.fill(0);
  combos.fill(0);
  correctCount.fill(0);
wrongCount.fill(0);
defeatedBossCount.fill(0);
  playerHP.fill(maxPlayerHP);
  bossHP.fill(maxBossHP);
  currentInput.fill(0);
  playerState[0]='playing';
  playerState[1]='playing';

  document.getElementById('result-overlay').classList.add('hidden');

  for(let i=0;i<2;i++){
    const side=document.getElementById(`side-${i}`);
    side.classList.remove('defeated');
    const ov=side.querySelector('.game-over-overlay');
    if(ov)ov.remove();
    document.querySelectorAll(`[data-player="${i}"] button`).forEach(b=>b.disabled=false);
    updatePlayerHP(i);
    updateBossHP(i);
    document.getElementById(`p${i+1}-score`).textContent='0分';
  }

  initQuestions();
  animateBossEntrance();
}

function initGame(){
  initQuestions();
  updateBossHP(0);
  updateBossHP(1);
  updatePlayerHP(0);
  updatePlayerHP(1);
}
</script>
</body>
</html>
